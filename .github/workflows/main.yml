name: Auto Remove Watermark
on:
  push:
    paths:
      - 'input/**' # Trigger jalan kalau ada foto baru di folder 'input'

jobs:
  remove-bg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install opencv-python-headless numpy

      - name: Run Watermark Remover
        run: |
          mkdir -p output
          # Loop semua file di folder input
          for file in input/*.{jpg,jpeg,png}; do
            [ -e "$file" ] || continue
            filename=$(basename "$file")
            # Kita pake koordinat default, nanti bos bisa edit di sini
            python main.py -i "$file" -o "output/clean_$filename" -x 50 -y 50 -w 300 -l 100
          done

      - name: Commit & Push Result
        run: |
          git config --global user.name "ikram-cyber-bot"
          git config --global user.email "bot@ikram-cyber.com"
          git add output/
          git commit -m "chore: auto-remove watermark result [skip ci]" || exit 0
          git push
